<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Error Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #0a0908;
  --bg2:      #111009;
  --bg3:      #19170f;
  --bg4:      #211f15;
  --bg5:      #2a271a;
  --amber:    #d4930a;
  --amber2:   #b87d08;
  --amber-dim:rgba(212,147,10,.12);
  --amber-glow:rgba(212,147,10,.22);
  --text:     #ede8dc;
  --text2:    #8a8272;
  --text3:    #4a4538;
  --red:      #c94e35;
  --red-dim:  rgba(201,78,53,.1);
  --green:    #5a9e72;
  --green-dim:rgba(90,158,114,.1);
  --blue:     #6892b8;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'IBM Plex Sans', system-ui, sans-serif;
  --radius:   10px;
  --radius-lg:14px;
}

html{font-size:16px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  padding:0 0 6rem;
  -webkit-font-smoothing:antialiased;
}

/* ── Layout ── */
.container{max-width:820px;margin:0 auto;padding:2rem 1.25rem}

/* ── Header ── */
.header{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:1.5rem 1.25rem 1.25rem;
  border-bottom:1px solid rgba(212,147,10,.1);
  position:sticky;top:0;
  background:rgba(10,9,8,.92);
  backdrop-filter:blur(12px);
  z-index:50;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:32px;height:32px;
  border:1.5px solid var(--amber);
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  color:var(--amber);
  flex-shrink:0;
}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:.02em}

.btn-primary{
  background:var(--amber);
  color:#0a0908;
  border:none;
  padding:8px 16px;
  border-radius:7px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  font-family:var(--sans);
  letter-spacing:.01em;
  transition:background .15s;
  white-space:nowrap;
}
.btn-primary:hover{background:var(--amber2)}
.btn-primary:active{transform:scale(.98)}

/* ── Stats ── */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:rgba(212,147,10,.08);
  border:1px solid rgba(212,147,10,.08);
  border-radius:var(--radius-lg);
  overflow:hidden;
  margin-bottom:1.5rem;
}
.stat{
  background:var(--bg2);
  padding:1rem 1.25rem;
}
.stat-n{font-size:28px;font-weight:600;line-height:1;margin-bottom:3px;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
}

/* ── Toolbar ── */
.toolbar{
  display:flex;gap:8px;
  margin-bottom:1.25rem;
  flex-wrap:wrap;
}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{
  width:100%;
  background:var(--bg2);
  border:1px solid rgba(212,147,10,.14);
  border-radius:var(--radius);
  color:var(--text);
  font-size:13.5px;
  padding:9px 12px 9px 36px;
  outline:none;
  font-family:var(--sans);
  transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--amber)}
.search-wrap input::placeholder{color:var(--text3)}
.s-icon{
  position:absolute;left:11px;top:50%;
  transform:translateY(-50%);
  color:var(--text3);font-size:15px;
  pointer-events:none;line-height:1;
}
.t-select{
  background:var(--bg2);
  border:1px solid rgba(212,147,10,.14);
  border-radius:var(--radius);
  color:var(--text2);font-size:13px;
  padding:9px 12px;outline:none;
  cursor:pointer;font-family:var(--sans);
  transition:border-color .15s;
}
.t-select:focus{border-color:var(--amber)}
.t-select option{background:var(--bg3)}

/* ── Card ── */
.error-card{
  background:var(--bg2);
  border:1px solid rgba(212,147,10,.1);
  border-radius:var(--radius-lg);
  overflow:hidden;
  margin-bottom:8px;
  transition:border-color .2s;
}
.error-card:hover{border-color:rgba(212,147,10,.22)}

.card-head{
  display:flex;align-items:center;
  gap:8px;padding:14px 16px;
  cursor:pointer;user-select:none;
  flex-wrap:wrap;row-gap:6px;
}

/* badges */
.badge{
  font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.05em;
  white-space:nowrap;border:1px solid transparent;
}
.b-npm  {color:#d4930a;background:rgba(212,147,10,.1); border-color:rgba(212,147,10,.2)}
.b-react{color:#6892b8;background:rgba(104,146,184,.1);border-color:rgba(104,146,184,.2)}
.b-git  {color:#9e82c4;background:rgba(158,130,196,.1);border-color:rgba(158,130,196,.2)}
.b-vite {color:#5a9e72;background:rgba(90,158,114,.1); border-color:rgba(90,158,114,.2)}
.b-ts   {color:#6892b8;background:rgba(104,146,184,.1);border-color:rgba(104,146,184,.2)}
.b-other{color:#6a6050;background:rgba(106,96,80,.12); border-color:rgba(106,96,80,.2)}
.b-easy {color:#5a9e72;background:rgba(90,158,114,.1); border-color:rgba(90,158,114,.2)}
.b-med  {color:#d4930a;background:rgba(212,147,10,.1); border-color:rgba(212,147,10,.2)}
.b-hard {color:#c94e35;background:rgba(201,78,53,.1);  border-color:rgba(201,78,53,.2)}

.err-pill{
  font-family:var(--mono);font-size:11px;
  color:var(--red);background:var(--red-dim);
  padding:3px 9px;border-radius:5px;
  border:1px solid rgba(201,78,53,.2);
  white-space:nowrap;
}
.card-title{
  font-size:14px;font-weight:500;
  color:var(--text);flex:1;
  min-width:100px;line-height:1.4;
}
.card-date{font-size:11px;color:var(--text3);white-space:nowrap;margin-left:auto}
.chevron{
  width:18px;height:18px;
  border-radius:4px;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--text3);
  flex-shrink:0;
  transition:transform .22s,background .15s;
}
.chevron.open{transform:rotate(90deg);background:var(--amber-dim);color:var(--amber)}

.card-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 12px}
.tag{
  font-size:11px;padding:2px 7px;
  border-radius:4px;
  background:var(--bg4);color:var(--text3);
  border:1px solid rgba(255,255,255,.04);
  font-family:var(--mono);
}

/* card body */
.card-body{
  border-top:1px solid rgba(212,147,10,.08);
  overflow:hidden;
  max-height:0;
  transition:max-height .3s ease;
}
.card-body.open{max-height:2000px}

.card-section{padding:14px 16px;border-bottom:1px solid rgba(212,147,10,.06)}
.card-section:last-child{border-bottom:none}
.sec-label{
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--text3);margin-bottom:10px;
}

/* code block (display) */
.codeblock{
  background:var(--bg);
  border:1px solid rgba(212,147,10,.12);
  border-radius:8px;
  padding:12px 14px 12px 14px;
  position:relative;
}
.codeblock pre{
  font-family:var(--mono);font-size:12px;
  color:#d4930a;line-height:1.75;
  white-space:pre-wrap;word-break:break-all;margin:0;
}
.copy-btn{
  position:absolute;top:8px;right:8px;
  background:var(--bg3);
  border:1px solid rgba(212,147,10,.15);
  border-radius:5px;color:var(--text2);
  font-size:11px;padding:3px 9px;
  cursor:pointer;font-family:var(--sans);
  transition:color .15s,background .15s;
  white-space:nowrap;
}
.copy-btn:hover{background:var(--bg5);color:var(--amber)}
.copy-btn.copied{color:var(--green);border-color:rgba(90,158,114,.25)}

/* steps display */
.steps-list{display:flex;flex-direction:column;gap:10px}
.step-row{display:flex;gap:12px;align-items:flex-start}
.step-dot{
  width:22px;height:22px;border-radius:50%;
  background:var(--bg4);
  border:1px solid rgba(212,147,10,.2);
  color:var(--amber);font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
.step-content{flex:1}
.step-type-label{
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--text3);margin-bottom:6px;
}
.step-text-p{font-size:13.5px;color:var(--text2);line-height:1.7}

/* empty / loading */
.empty{text-align:center;padding:4rem 1rem;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;line-height:1.6}
.loading{
  text-align:center;padding:3rem;
  color:var(--text3);font-size:13px;
}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.8}}
.pulse{animation:pulse 1.6s ease-in-out infinite}

/* toast */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--bg3);
  border:1px solid rgba(212,147,10,.2);
  border-radius:8px;padding:9px 20px;
  font-size:13px;color:var(--text);
  opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:999;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok {border-color:rgba(90,158,114,.35);color:var(--green)}
#toast.err{border-color:rgba(201,78,53,.35);color:var(--red)}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;
  opacity:0;pointer-events:none;
  transition:opacity .22s;
}
.overlay.open{opacity:1;pointer-events:all}

.modal{
  background:var(--bg2);
  border:1px solid rgba(212,147,10,.16);
  border-radius:18px 18px 0 0;
  width:100%;max-width:640px;
  max-height:92vh;overflow-y:auto;
  padding:0 0 2rem;
  transform:translateY(24px);
  transition:transform .25s cubic-bezier(.22,1,.36,1);
}
.overlay.open .modal{transform:translateY(0)}

.modal-handle{
  width:36px;height:3px;
  background:var(--bg5);
  border-radius:2px;
  margin:12px auto 0;
}
.modal-head{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:1rem 1.5rem .75rem;
  position:sticky;top:0;
  background:var(--bg2);
  border-bottom:1px solid rgba(212,147,10,.08);
  z-index:10;
}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-x{
  background:var(--bg4);border:none;
  width:28px;height:28px;border-radius:6px;
  color:var(--text2);font-size:14px;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.modal-x:hover{background:var(--bg5);color:var(--text)}

.modal-body{padding:1rem 1.5rem 0}

/* form */
.fg{margin-bottom:1rem}
.fl{
  display:block;font-size:11px;font-weight:600;
  color:var(--text2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.05em;
}
.fi,.fs,.fta{
  width:100%;
  background:var(--bg3);
  border:1px solid rgba(212,147,10,.14);
  border-radius:8px;color:var(--text);
  font-size:13.5px;padding:9px 12px;
  outline:none;font-family:var(--sans);
  transition:border-color .15s;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--amber)}
.fi::placeholder,.fta::placeholder{color:var(--text3)}
.fta{resize:vertical;min-height:72px;line-height:1.6}
.fta.mono{font-family:var(--mono);font-size:12px;color:var(--amber)}
.fs option{background:var(--bg3)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}
.fhint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}

/* ── Step builder ── */
.step-builder{margin-bottom:1rem}
.sb-label{
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
  color:var(--text2);margin-bottom:8px;display:block;
}
.sb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}

.sb-item{
  background:var(--bg3);
  border:1px solid rgba(212,147,10,.12);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .15s;
}
.sb-item:focus-within{border-color:rgba(212,147,10,.3)}

.sb-item-head{
  display:flex;align-items:center;
  gap:8px;padding:9px 12px;
  border-bottom:1px solid rgba(212,147,10,.08);
}
.sb-num{
  width:20px;height:20px;border-radius:50%;
  background:var(--bg5);
  border:1px solid rgba(212,147,10,.2);
  color:var(--amber);font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sb-type-toggle{
  display:flex;gap:4px;flex:1;
}
.type-btn{
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:5px;
  border:1px solid rgba(212,147,10,.12);
  background:transparent;color:var(--text3);
  cursor:pointer;font-family:var(--sans);
  transition:all .15s;
}
.type-btn.active{
  background:var(--amber-dim);
  border-color:rgba(212,147,10,.3);
  color:var(--amber);
}
.sb-del{
  background:none;border:none;
  color:var(--text3);font-size:15px;
  cursor:pointer;padding:2px 4px;
  line-height:1;
  transition:color .15s;
  margin-left:auto;
}
.sb-del:hover{color:var(--red)}

.sb-item textarea{
  width:100%;background:transparent;
  border:none;color:var(--text);
  font-size:13px;padding:10px 12px;
  outline:none;resize:none;
  line-height:1.65;
  font-family:var(--sans);
  min-height:60px;
}
.sb-item textarea.mono{font-family:var(--mono);font-size:12px;color:var(--amber);min-height:70px}
.sb-item textarea::placeholder{color:var(--text3)}

.btn-add-step{
  width:100%;
  background:transparent;
  border:1px dashed rgba(212,147,10,.2);
  border-radius:8px;
  color:var(--text3);
  font-size:13px;font-weight:500;
  padding:9px;cursor:pointer;
  font-family:var(--sans);
  transition:border-color .15s,color .15s,background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-add-step:hover{
  border-color:rgba(212,147,10,.4);
  color:var(--amber);
  background:var(--amber-dim);
}

.divider{border:none;border-top:1px solid rgba(212,147,10,.07);margin:1rem 0}

.btn-submit{
  width:100%;background:var(--amber);color:#0a0908;
  border:none;border-radius:9px;
  padding:12px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--sans);
  margin-top:4px;
  transition:background .15s;
  letter-spacing:.01em;
}
.btn-submit:hover{background:var(--amber2)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <div class="brand-mark">⚡</div>
    <div>
      <div class="brand-name">Error Tracker</div>
      <div class="brand-sub">React · React Native · 6mo roadmap</div>
    </div>
  </div>
  <button class="btn-primary" onclick="openModal()">+ Log Error</button>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-n" id="s-total">—</div>
      <div class="stat-l">Total</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-hard" style="color:var(--red)">—</div>
      <div class="stat-l">Hard</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-fixed" style="color:var(--green)">—</div>
      <div class="stat-l">With fix</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-npm" style="color:var(--amber)">—</div>
      <div class="stat-l">npm</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input type="text" id="search" placeholder="Search title, code, tags…" oninput="renderList()"/>
    </div>
    <select class="t-select" id="f-cat" onchange="renderList()">
      <option value="">All categories</option>
      <option>npm</option><option>React</option>
      <option>React Native</option><option>Git</option>
      <option>Vite</option><option>TypeScript</option><option>Other</option>
    </select>
    <select class="t-select" id="f-diff" onchange="renderList()">
      <option value="">All difficulties</option>
      <option>Easy</option><option>Medium</option><option>Hard</option>
    </select>
    <select class="t-select" id="f-sort" onchange="renderList()">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="difficulty">Difficulty</option>
      <option value="category">Category</option>
    </select>
  </div>

  <!-- List -->
  <div id="error-list">
    <div class="loading pulse">Loading errors…</div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">Log an error</span>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="frow">
        <div class="fg" style="flex:2">
          <label class="fl">Title *</label>
          <input class="fi" id="f-title" placeholder="Short description of what broke"/>
        </div>
        <div class="fg">
          <label class="fl">Error Code</label>
          <input class="fi" id="f-code" placeholder="EPERM, E404…"/>
        </div>
      </div>

      <div class="frow">
        <div class="fg">
          <label class="fl">Category</label>
          <select class="fs" id="f-cat2">
            <option>npm</option><option>React</option>
            <option>React Native</option><option>Git</option>
            <option>Vite</option><option>TypeScript</option><option>Other</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Difficulty</label>
          <select class="fs" id="f-diff2">
            <option>Easy</option>
            <option selected>Medium</option>
            <option>Hard</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Error message *</label>
        <textarea class="fta mono" id="f-desc" rows="4" placeholder="Paste the full error output here…"></textarea>
      </div>

      <div class="fg">
        <label class="fl">Tags</label>
        <input class="fi" id="f-tags" placeholder="windows, path, permissions (comma separated)"/>
        <div class="fhint">Helps with searching later</div>
      </div>

      <hr class="divider"/>

      <!-- Step builder -->
      <div class="step-builder">
        <span class="sb-label">Fix — step by step *</span>
        <div class="sb-list" id="sb-list"></div>
        <button class="btn-add-step" onclick="addStep()">+ Add step</button>
      </div>

      <button class="btn-submit" id="f-submit" onclick="submitError()">
        <span id="f-submit-lbl">Save error</span>
      </button>

    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://error-tracker-proxy.hsk42116.workers.dev";

let allErrors = [];
let steps = []; // [{type:'code'|'text', content:''}]

/* ── Step builder ── */
function addStep(type = "text") {
  const id = Date.now();
  steps.push({ id, type, content: "" });
  renderStepBuilder();
  // focus last textarea
  setTimeout(() => {
    const last = document.querySelector(`#sb-list .sb-item:last-child textarea`);
    if (last) last.focus();
  }, 50);
}

function removeStep(id) {
  steps = steps.filter(s => s.id !== id);
  renderStepBuilder();
}

function setStepType(id, type) {
  const s = steps.find(s => s.id === id);
  if (s) { s.type = type; renderStepBuilder(); }
}

function syncStepContent(id, val) {
  const s = steps.find(s => s.id === id);
  if (s) s.content = val;
}

function renderStepBuilder() {
  const list = document.getElementById("sb-list");
  if (!steps.length) { list.innerHTML = ""; return; }
  list.innerHTML = steps.map((s, i) => `
    <div class="sb-item">
      <div class="sb-item-head">
        <div class="sb-num">${i + 1}</div>
        <div class="sb-type-toggle">
          <button class="type-btn ${s.type === 'text' ? 'active' : ''}"
            onclick="setStepType(${s.id},'text')">Text</button>
          <button class="type-btn ${s.type === 'code' ? 'active' : ''}"
            onclick="setStepType(${s.id},'code')">Code</button>
        </div>
        <button class="sb-del" onclick="removeStep(${s.id})" title="Remove step">✕</button>
      </div>
      <textarea
        class="${s.type === 'code' ? 'mono' : ''}"
        placeholder="${s.type === 'code' ? 'npm install / code to run…' : 'Explain what to do in this step…'}"
        oninput="syncStepContent(${s.id}, this.value)"
        rows="${s.type === 'code' ? 3 : 2}"
      >${escHtml(s.content)}</textarea>
    </div>
  `).join("");
}

/* Serialize steps → "1. [code] npm install\n2. [text] Then restart" */
function serializeSteps() {
  return steps
    .filter(s => s.content.trim())
    .map((s, i) => `${i + 1}. [${s.type}] ${s.content.trim()}`)
    .join("\n");
}

/* Deserialize for display */
function parseSteps(fix) {
  if (!fix) return null;
  const lines = fix.split("\n").map(l => l.trim()).filter(Boolean);
  const parsed = lines.map(l => {
    const m = l.match(/^(\d+)\.\s*\[(code|text)\]\s*([\s\S]*)$/);
    if (m) return { num: m[1], type: m[2], content: m[3] };
    // fallback: plain numbered line
    const m2 = l.match(/^(\d+)[\.\)]\s*([\s\S]*)$/);
    if (m2) return { num: m2[1], type: "text", content: m2[2] };
    return null;
  }).filter(Boolean);
  return parsed.length ? parsed : null;
}

/* ── Data ── */
async function loadErrors() {
  try {
    const res  = await fetch(`${WORKER_URL}/errors`);
    const data = await res.json();
    allErrors  = (data.results || []).map(p => ({
      id:          p.id,
      title:       p.properties?.Title?.title?.[0]?.text?.content || "Untitled",
      errorCode:   p.properties?.["Error Code"]?.rich_text?.[0]?.text?.content || "",
      category:    p.properties?.Category?.select?.name || "Other",
      difficulty:  p.properties?.Difficulty?.select?.name || "Medium",
      description: p.properties?.Description?.rich_text?.[0]?.text?.content || "",
      fix:         p.properties?.Fix?.rich_text?.[0]?.text?.content || "",
      tags:        p.properties?.Tags?.rich_text?.[0]?.text?.content || "",
      date:        p.properties?.Date?.date?.start || "",
    }));
    updateStats();
    renderList();
  } catch {
    document.getElementById("error-list").innerHTML =
      `<div class="empty"><div class="empty-icon">⚠</div><p>Could not load errors.<br/>Check your Worker URL.</p></div>`;
  }
}

function updateStats() {
  document.getElementById("s-total").textContent = allErrors.length;
  document.getElementById("s-hard").textContent  = allErrors.filter(e => e.difficulty === "Hard").length;
  document.getElementById("s-fixed").textContent = allErrors.filter(e => e.fix).length;
  document.getElementById("s-npm").textContent   = allErrors.filter(e => e.category  === "npm").length;
}

/* ── Render ── */
const catCls  = c => ({npm:"b-npm",React:"b-react","React Native":"b-react",Git:"b-git",Vite:"b-vite",TypeScript:"b-ts"}[c]||"b-other");
const diffCls = d => ({Easy:"b-easy",Medium:"b-med",Hard:"b-hard"}[d]||"b-med");

function fmtDate(d) {
  if (!d) return "";
  return new Date(d + "T12:00:00").toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"});
}

function renderDisplaySteps(fix) {
  const parsed = parseSteps(fix);
  if (!parsed) return `<p class="step-text-p">${escHtml(fix)}</p>`;
  return `<div class="steps-list">${parsed.map(s => `
    <div class="step-row">
      <div class="step-dot">${s.num}</div>
      <div class="step-content">
        ${s.type === "code"
          ? `<div class="step-type-label">Command</div>
             <div class="codeblock" style="padding:8px 12px">
               <pre id="sc-${s.num}-${Math.random().toString(36).slice(2)}">${escHtml(s.content)}</pre>
               <button class="copy-btn" onclick="copyPre(this)">Copy</button>
             </div>`
          : `<p class="step-text-p">${escHtml(s.content)}</p>`
        }
      </div>
    </div>`).join("")}</div>`;
}

function renderTags(str) {
  if (!str) return "";
  const tags = str.split(",").map(t => t.trim()).filter(Boolean);
  return tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>` : "";
}

function sortList(list) {
  const by = document.getElementById("f-sort").value;
  const c  = [...list];
  if (by === "oldest")     return c.sort((a,b) => a.date.localeCompare(b.date));
  if (by === "difficulty") { const o={Hard:0,Medium:1,Easy:2}; return c.sort((a,b)=>(o[a.difficulty]??1)-(o[b.difficulty]??1)); }
  if (by === "category")   return c.sort((a,b) => a.category.localeCompare(b.category));
  return c.sort((a,b) => b.date.localeCompare(a.date));
}

function renderList() {
  const q    = document.getElementById("search").value.toLowerCase();
  const cat  = document.getElementById("f-cat").value;
  const diff = document.getElementById("f-diff").value;

  let list = allErrors.filter(e => {
    const matchQ = !q    || [e.title,e.errorCode,e.description,e.fix,e.tags].join(" ").toLowerCase().includes(q);
    const matchC = !cat  || e.category   === cat;
    const matchD = !diff || e.difficulty === diff;
    return matchQ && matchC && matchD;
  });
  list = sortList(list);

  const el = document.getElementById("error-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">○</div><p>No errors found.</p></div>`;
    return;
  }

  el.innerHTML = list.map((e, i) => `
    <div class="error-card">
      <div class="card-head" onclick="toggle(${i})">
        <span class="badge ${catCls(e.category)}">${e.category}</span>
        <span class="badge ${diffCls(e.difficulty)}">${e.difficulty}</span>
        ${e.errorCode ? `<span class="err-pill">${e.errorCode}</span>` : ""}
        <span class="card-title">${escHtml(e.title)}</span>
        <span class="card-date">${fmtDate(e.date)}</span>
        <div class="chevron" id="chev-${i}">▶</div>
      </div>
      ${renderTags(e.tags)}
      <div class="card-body" id="body-${i}">
        ${e.description ? `
        <div class="card-section">
          <div class="sec-label">Error output</div>
          <div class="codeblock">
            <pre>${escHtml(e.description)}</pre>
            <button class="copy-btn" onclick="copyPre(this)">Copy</button>
          </div>
        </div>` : ""}
        ${e.fix ? `
        <div class="card-section">
          <div class="sec-label">Fix</div>
          ${renderDisplaySteps(e.fix)}
        </div>` : ""}
      </div>
    </div>`).join("");
}

function toggle(i) {
  const body = document.getElementById(`body-${i}`);
  const chev = document.getElementById(`chev-${i}`);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}

function copyPre(btn) {
  const pre = btn.previousElementSibling;
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

/* ── Modal ── */
function openModal() {
  steps = [];
  renderStepBuilder();
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("f-title").focus(), 200);
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  ["f-title","f-code","f-desc","f-tags"].forEach(id => document.getElementById(id).value = "");
  steps = [];
  renderStepBuilder();
}

function overlayClick(e) { if (e.target.id === "overlay") closeModal(); }

/* ── Submit ── */
async function submitError() {
  const title = document.getElementById("f-title").value.trim();
  const desc  = document.getElementById("f-desc").value.trim();
  const fix   = serializeSteps();

  if (!title)   { toast("Title is required.", "err"); return; }
  if (!desc)    { toast("Error message is required.", "err"); return; }
  if (!fix)     { toast("Add at least one fix step.", "err"); return; }

  const btn = document.getElementById("f-submit");
  const lbl = document.getElementById("f-submit-lbl");
  btn.disabled = true; lbl.textContent = "Saving…";

  try {
    const res = await fetch(`${WORKER_URL}/errors`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title,
        errorCode:   document.getElementById("f-code").value.trim(),
        category:    document.getElementById("f-cat2").value,
        difficulty:  document.getElementById("f-diff2").value,
        description: desc,
        fix,
        tags: document.getElementById("f-tags").value.trim(),
      }),
    });
    if (!res.ok) throw new Error(res.status);
    toast("Error logged ✓", "ok");
    closeModal();
    await loadErrors();
  } catch (err) {
    toast(`Save failed (${err.message})`, "err");
  } finally {
    btn.disabled = false; lbl.textContent = "Save error";
  }
}

function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => { t.className = ""; }, 3000);
}

const escHtml = s => String(s)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

loadErrors();
</script>
</body>
