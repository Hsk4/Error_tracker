<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dev Error Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e8e9f0;
      --text2: #9497a8;
      --text3: #5a5e72;
      --red: #FF5F57;
      --yellow: #FAC775;
      --blue: #6fa3ef;
      --green: #4ec9a0;
      --purple: #b39ddb;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #FF5F57, #b34a46);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .logo span { font-size: 12px; color: var(--text2); font-weight: 400; display: block; margin-top: 1px; }

    .btn-add {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s;
    }
    .btn-add:hover { opacity: .85; }

    /* Search & filter bar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--blue); }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
    }
    .filter-select {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      flex: 1;
      min-width: 100px;
    }
    .stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

    /* Error list */
    #error-list { display: flex; flex-direction: column; gap: 10px; }

    .error-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .error-card:hover { border-color: var(--border2); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .cat-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .cat-npm      { background: #3a2a10; color: #FAC775; }
    .cat-react    { background: #0d2e3e; color: #6fa3ef; }
    .cat-git      { background: #2a1030; color: #b39ddb; }
    .cat-vite     { background: #1a2e1a; color: #4ec9a0; }
    .cat-ts       { background: #0d1e3a; color: #79b8ff; }
    .cat-other    { background: #1e2030; color: #9497a8; }

    .err-code {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--red);
      background: rgba(255,95,87,.1);
      padding: 2px 7px;
      border-radius: 4px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }
    .card-date {
      font-size: 11px;
      color: var(--text3);
      margin-left: auto;
    }
    .chevron {
      font-size: 10px;
      color: var(--text3);
      transition: transform .2s;
    }
    .chevron.open { transform: rotate(90deg); }

    .card-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .card-body.open { display: block; }

    .card-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-section:last-child { border-bottom: none; }
    .section-lbl {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text3);
      margin-bottom: 5px;
    }
    .section-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

    .fix-block {
      background: rgba(78,201,160,.06);
      border: 1px solid rgba(78,201,160,.15);
      border-radius: 7px;
      padding: 10px 12px;
    }
    .fix-block .section-lbl { color: var(--green); }
    .fix-block .section-text { color: #b0e8d8; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty p { font-size: 14px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text3);
      font-size: 13px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: rgba(78,201,160,.4); }
    #toast.error   { border-color: rgba(255,95,87,.4); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
      margin: 1rem;
      transform: translateY(16px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close {
      background: none; border: none;
      color: var(--text3); font-size: 18px;
      cursor: pointer; line-height: 1;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
      font-family: var(--sans);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--blue);
    }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-select option { background: var(--bg3); }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .btn-submit {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-submit:hover { opacity: .85; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>Dev Error Tracker</h1>
        <span>React + React Native roadmap errors</span>
      </div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Add Error</button>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total errors</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-npm" style="color:var(--yellow)">—</div>
      <div class="stat-label">npm</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-react" style="color:var(--blue)">—</div>
      <div class="stat-label">React</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-other" style="color:var(--text3)">—</div>
      <div class="stat-label">Other</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search errors..." oninput="renderList()" />
    </div>
    <select class="filter-select" id="filter-cat" onchange="renderList()">
      <option value="">All categories</option>
      <option value="npm">npm</option>
      <option value="React">React</option>
      <option value="React Native">React Native</option>
      <option value="Git">Git</option>
      <option value="Vite">Vite</option>
      <option value="TypeScript">TypeScript</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div id="error-list">
    <div class="loading">Loading errors...</div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Log a new error</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="f-title" placeholder="e.g. npm install fails" />
      </div>
      <div class="form-group">
        <label class="form-label">Error Code</label>
        <input class="form-input" id="f-code" placeholder="e.g. EPERM -4048" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-cat">
        <option>npm</option>
        <option>React</option>
        <option>React Native</option>
        <option>Git</option>
        <option>Vite</option>
        <option>TypeScript</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What happened? Paste the error message..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Fix / Solution *</label>
      <textarea class="form-textarea" id="f-fix" placeholder="What solved it?"></textarea>
    </div>
    <button class="btn-submit" id="submit-btn" onclick="submitError()">
      <span id="submit-label">Save Error</span>
    </button>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  // Replace this with your deployed Cloudflare Worker URL
  const WORKER_URL = "https://error-tracker-proxy.hsk42116.workers.dev";
  // ──────────────────────────────────────────────────────────

  let allErrors = [];

  async function loadErrors() {
    try {
      const res = await fetch(`${WORKER_URL}/errors`);
      const data = await res.json();
      allErrors = (data.results || []).map(page => ({
        id: page.id,
        title: page.properties?.Title?.title?.[0]?.text?.content || "Untitled",
        errorCode: page.properties?.["Error Code"]?.rich_text?.[0]?.text?.content || "",
        category: page.properties?.Category?.select?.name || "Other",
        description: page.properties?.Description?.rich_text?.[0]?.text?.content || "",
        fix: page.properties?.Fix?.rich_text?.[0]?.text?.content || "",
        date: page.properties?.Date?.date?.start || "",
      }));
      updateStats();
      renderList();
    } catch (e) {
      document.getElementById("error-list").innerHTML =
        `<div class="empty"><div class="empty-icon">⚠</div><p>Could not load errors. Check your Worker URL.</p></div>`;
    }
  }

  function updateStats() {
    document.getElementById("stat-total").textContent = allErrors.length;
    document.getElementById("stat-npm").textContent = allErrors.filter(e => e.category === "npm").length;
    document.getElementById("stat-react").textContent = allErrors.filter(e => e.category === "React").length;
    document.getElementById("stat-other").textContent = allErrors.filter(e => !["npm","React"].includes(e.category)).length;
  }

  function catClass(cat) {
    const map = { npm:"cat-npm", React:"cat-react", "React Native":"cat-react", Git:"cat-git", Vite:"cat-vite", TypeScript:"cat-ts" };
    return map[cat] || "cat-other";
  }

  function fmtDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
  }

  function renderList() {
    const q = document.getElementById("search").value.toLowerCase();
    const cat = document.getElementById("filter-cat").value;
    const filtered = allErrors.filter(e => {
      const matchQ = !q || [e.title, e.errorCode, e.description, e.fix].join(" ").toLowerCase().includes(q);
      const matchC = !cat || e.category === cat;
      return matchQ && matchC;
    });

    const list = document.getElementById("error-list");
    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No errors found.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map((e, i) => `
      <div class="error-card">
        <div class="card-header" onclick="toggleCard(${i})">
          <span class="cat-badge ${catClass(e.category)}">${e.category}</span>
          ${e.errorCode ? `<span class="err-code">${e.errorCode}</span>` : ""}
          <span class="card-title">${e.title}</span>
          <span class="card-date">${fmtDate(e.date)}</span>
          <span class="chevron" id="chev-${i}">▶</span>
        </div>
        <div class="card-body" id="body-${i}">
          <div class="card-section">
            <div class="section-lbl">Description</div>
            <div class="section-text">${e.description}</div>
          </div>
          <div class="card-section">
            <div class="fix-block">
              <div class="section-lbl">Fix / Solution</div>
              <div class="section-text">${e.fix}</div>
            </div>
          </div>
        </div>
      </div>
    `).join("");
  }

  function toggleCard(i) {
    const body = document.getElementById(`body-${i}`);
    const chev = document.getElementById(`chev-${i}`);
    body.classList.toggle("open");
    chev.classList.toggle("open");
  }

  function openModal() {
    document.getElementById("modal-overlay").classList.add("open");
  }
  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    ["f-title","f-code","f-desc","f-fix"].forEach(id => document.getElementById(id).value = "");
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  }

  async function submitError() {
    const title = document.getElementById("f-title").value.trim();
    const desc  = document.getElementById("f-desc").value.trim();
    const fix   = document.getElementById("f-fix").value.trim();
    if (!title || !desc || !fix) { showToast("Please fill in all required fields.", "error"); return; }

    const btn = document.getElementById("submit-btn");
    const lbl = document.getElementById("submit-label");
    btn.disabled = true; lbl.textContent = "Saving...";

    try {
      const res = await fetch(`${WORKER_URL}/errors`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          errorCode: document.getElementById("f-code").value.trim(),
          category: document.getElementById("f-cat").value,
          description: desc,
          fix,
        }),
      });
      if (!res.ok) throw new Error();
      showToast("Error logged successfully!", "success");
      closeModal();
      await loadErrors();
    } catch {
      showToast("Failed to save. Check your Worker URL.", "error");
    } finally {
      btn.disabled = false; lbl.textContent = "Save Error";
    }
  }

  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 3000);
  }

  loadErrors();
</script>
</body>
</html>
