<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dev Error Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0c08;
      --bg2:     #161410;
      --bg3:     #1f1c16;
      --bg4:     #272318;
      --border:  rgba(250,199,117,0.08);
      --border2: rgba(250,199,117,0.18);
      --border3: rgba(250,199,117,0.32);
      --text:    #f5edd8;
      --text2:   #a89878;
      --text3:   #5a5040;
      --yellow:  #FAC775;
      --yellow2: #f5a623;
      --yellow3: #e8890a;
      --red:     #e05c3a;
      --green:   #6fcf97;
      --blue:    #7eb8e8;
      --purple:  #b39ddb;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }

    .container { max-width: 880px; margin: 0 auto; }

    /* Header */
    header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: var(--yellow3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 28px rgba(232,137,10,0.4);
    }
    .logo h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.4px; }
    .logo span { font-size: 12px; color: var(--text3); display: block; margin-top: 2px; }

    .btn-add {
      background: var(--yellow3); color: #0e0c08;
      border: none; padding: 9px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .15s, box-shadow .15s;
      box-shadow: 0 0 18px rgba(232,137,10,0.35);
    }
    .btn-add:hover { background: var(--yellow2); box-shadow: 0 0 28px rgba(232,137,10,0.55); }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      position: relative; overflow: hidden;
    }
    .stat::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent, var(--yellow3)); opacity: .7;
    }
    .stat-num { font-size: 26px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--bg2);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-size: 13px;
      padding: 9px 12px 9px 36px; outline: none;
      transition: border-color .15s; font-family: var(--sans);
    }
    .search-wrap input:focus { border-color: var(--yellow3); }
    .search-wrap input::placeholder { color: var(--text3); }
    .search-icon {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%); color: var(--text3);
      font-size: 14px; pointer-events: none;
    }
    .toolbar-select {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text2); font-size: 13px;
      padding: 9px 12px; outline: none; cursor: pointer; font-family: var(--sans);
    }
    .toolbar-select:focus { border-color: var(--yellow3); }
    .toolbar-select option { background: var(--bg3); }

    /* Cards */
    #error-list { display: flex; flex-direction: column; gap: 10px; }

    .error-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .error-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,.5); }

    .card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px; cursor: pointer; user-select: none; flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 10px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .cat-npm   { background: rgba(250,199,117,.1); color:#FAC775; border:1px solid rgba(250,199,117,.2); }
    .cat-react { background: rgba(126,184,232,.1); color:#7eb8e8; border:1px solid rgba(126,184,232,.2); }
    .cat-git   { background: rgba(179,157,219,.1); color:#b39ddb; border:1px solid rgba(179,157,219,.2); }
    .cat-vite  { background: rgba(111,207,151,.1); color:#6fcf97; border:1px solid rgba(111,207,151,.2); }
    .cat-ts    { background: rgba(126,184,232,.1); color:#79b8ff; border:1px solid rgba(126,184,232,.2); }
    .cat-other { background: rgba(90,80,64,.3);    color:#a89878; border:1px solid rgba(90,80,64,.4); }

    .diff-badge {
      font-size: 10px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; text-transform: uppercase;
      letter-spacing: .05em; white-space: nowrap;
    }
    .diff-easy   { background:rgba(111,207,151,.1); color:#6fcf97; border:1px solid rgba(111,207,151,.2); }
    .diff-medium { background:rgba(250,199,117,.1); color:#FAC775; border:1px solid rgba(250,199,117,.2); }
    .diff-hard   { background:rgba(224,92,58,.1);   color:#e05c3a; border:1px solid rgba(224,92,58,.2); }

    .err-code {
      font-family: var(--mono); font-size: 11px; color: var(--red);
      background: rgba(224,92,58,.1); padding: 3px 8px;
      border-radius: 5px; border: 1px solid rgba(224,92,58,.2); white-space: nowrap;
    }
    .card-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 100px; }
    .card-date  { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .chevron    { font-size: 10px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(90deg); }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 11px; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--bg4); color: var(--text2);
      border: 1px solid var(--border); font-family: var(--mono);
    }

    .card-body { display: none; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    .card-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .card-section:last-child { border-bottom: none; }

    .section-lbl {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text3); margin-bottom: 8px;
    }
    .section-text { font-size: 13px; color: var(--text2); line-height: 1.65; }

    /* Code block */
    .code-block {
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: 12px 14px; position: relative;
    }
    .code-block pre {
      font-family: var(--mono); font-size: 12px; color: #FAC775;
      white-space: pre-wrap; word-break: break-all; line-height: 1.7; margin: 0;
    }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 5px; color: var(--text2); font-size: 11px;
      padding: 3px 9px; cursor: pointer; font-family: var(--sans);
      transition: background .15s, color .15s;
    }
    .copy-btn:hover { background: var(--bg4); color: var(--yellow); }
    .copy-btn.copied { color: var(--green); border-color: rgba(111,207,151,.3); }

    /* Fix steps */
    .fix-steps { display: flex; flex-direction: column; gap: 10px; }
    .fix-step  { display: flex; gap: 12px; align-items: flex-start; }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(232,137,10,.12); border: 1px solid rgba(232,137,10,.3);
      color: var(--yellow3); font-size: 11px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-text { font-size: 13px; color: var(--text2); line-height: 1.65; flex: 1; }

    /* Empty / loading */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty p { font-size: 14px; }
    .loading { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 13px; }
    .pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 9px; padding: 10px 18px; font-size: 13px;
      color: var(--text); opacity: 0; transform: translateY(10px);
      transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 999; max-width: 300px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: rgba(111,207,151,.4); color: var(--green); }
    #toast.error   { border-color: rgba(224,92,58,.4);   color: var(--red); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .2s; padding: 1rem;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 16px; padding: 1.5rem;
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px) scale(.98); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1.25rem;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-size: 14px; width: 28px; height: 28px;
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .modal-close:hover { color: var(--text); background: var(--bg4); }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text2); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-size: 13px; padding: 9px 12px;
      outline: none; transition: border-color .15s; font-family: var(--sans);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--yellow3); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .form-textarea.mono { font-family: var(--mono); font-size: 12px; }
    .form-select option { background: var(--bg3); }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.5; }

    .btn-submit {
      width: 100%; background: var(--yellow3); color: #0e0c08;
      border: none; border-radius: 9px; padding: 11px;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-submit:hover { background: var(--yellow2); }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <h1>Dev Error Tracker</h1>
        <span>React + React Native — 6 month roadmap</span>
      </div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Log Error</button>
  </header>

  <div class="stats">
    <div class="stat" style="--accent:#FAC775">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total logged</div>
    </div>
    <div class="stat" style="--accent:#e05c3a">
      <div class="stat-num" id="stat-hard" style="color:var(--red)">—</div>
      <div class="stat-label">Hard errors</div>
    </div>
    <div class="stat" style="--accent:#6fcf97">
      <div class="stat-num" id="stat-resolved" style="color:var(--green)">—</div>
      <div class="stat-label">With fixes</div>
    </div>
    <div class="stat" style="--accent:#7eb8e8">
      <div class="stat-num" id="stat-npm" style="color:var(--blue)">—</div>
      <div class="stat-label">npm errors</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search errors, codes, tags..." oninput="renderList()"/>
    </div>
    <select class="toolbar-select" id="filter-cat" onchange="renderList()">
      <option value="">All categories</option>
      <option value="npm">npm</option>
      <option value="React">React</option>
      <option value="React Native">React Native</option>
      <option value="Git">Git</option>
      <option value="Vite">Vite</option>
      <option value="TypeScript">TypeScript</option>
      <option value="Other">Other</option>
    </select>
    <select class="toolbar-select" id="filter-diff" onchange="renderList()">
      <option value="">All difficulties</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <select class="toolbar-select" id="sort-by" onchange="renderList()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="difficulty">By difficulty</option>
      <option value="category">By category</option>
    </select>
  </div>

  <div id="error-list">
    <div class="loading pulse">Loading errors...</div>
  </div>

</div>

<div id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚡ Log a new error</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="f-title" placeholder="e.g. npm install fails on D:\"/>
      </div>
      <div class="form-group">
        <label class="form-label">Error Code</label>
        <input class="form-input" id="f-code" placeholder="e.g. EPERM -4048"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="f-cat">
          <option>npm</option>
          <option>React</option>
          <option>React Native</option>
          <option>Git</option>
          <option>Vite</option>
          <option>TypeScript</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Difficulty</label>
        <select class="form-select" id="f-diff">
          <option>Easy</option>
          <option selected>Medium</option>
          <option>Hard</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Error Message *</label>
      <textarea class="form-textarea mono" id="f-desc" placeholder="Paste the full error message here..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Fix — step by step *</label>
      <textarea class="form-textarea" id="f-fix" placeholder="1. First do this&#10;2. Then do this&#10;3. Finally do this"></textarea>
      <div class="form-hint">Start each step with a number e.g. "1. Run npm init -y" — they'll render as numbered steps</div>
    </div>

    <div class="form-group">
      <label class="form-label">Tags</label>
      <input class="form-input" id="f-tags" placeholder="windows, permissions, path (comma separated)"/>
      <div class="form-hint">Helps with searching later</div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="submitError()">
      <span id="submit-label">Save Error</span>
    </button>
  </div>
</div>

<script>
  const WORKER_URL = "https://error-tracker-proxy.hsk42116.workers.dev";

  let allErrors = [];

  async function loadErrors() {
    try {
      const res  = await fetch(`${WORKER_URL}/errors`);
      const data = await res.json();
      allErrors  = (data.results || []).map(p => ({
        id:          p.id,
        title:       p.properties?.Title?.title?.[0]?.text?.content || "Untitled",
        errorCode:   p.properties?.["Error Code"]?.rich_text?.[0]?.text?.content || "",
        category:    p.properties?.Category?.select?.name || "Other",
        difficulty:  p.properties?.Difficulty?.select?.name || "Medium",
        description: p.properties?.Description?.rich_text?.[0]?.text?.content || "",
        fix:         p.properties?.Fix?.rich_text?.[0]?.text?.content || "",
        tags:        p.properties?.Tags?.rich_text?.[0]?.text?.content || "",
        date:        p.properties?.Date?.date?.start || "",
      }));
      updateStats();
      renderList();
    } catch {
      document.getElementById("error-list").innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load errors.<br>Check your Worker URL.</p></div>`;
    }
  }

  function updateStats() {
    document.getElementById("stat-total").textContent    = allErrors.length;
    document.getElementById("stat-hard").textContent     = allErrors.filter(e => e.difficulty === "Hard").length;
    document.getElementById("stat-resolved").textContent = allErrors.filter(e => e.fix).length;
    document.getElementById("stat-npm").textContent      = allErrors.filter(e => e.category  === "npm").length;
  }

  const catClass  = c => ({ npm:"cat-npm", React:"cat-react", "React Native":"cat-react", Git:"cat-git", Vite:"cat-vite", TypeScript:"cat-ts" }[c] || "cat-other");
  const diffClass = d => ({ Easy:"diff-easy", Medium:"diff-medium", Hard:"diff-hard" }[d] || "diff-medium");

  function fmtDate(d) {
    if (!d) return "";
    return new Date(d + "T12:00:00").toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
  }

  function renderSteps(text) {
    if (!text) return "";
    const lines   = text.split("\n").map(l => l.trim()).filter(Boolean);
    const isSteps = lines.filter(l => /^\d+[\.\)]/.test(l)).length >= 2;
    if (isSteps) {
      return `<div class="fix-steps">${lines.map((l, i) => {
        const num   = (l.match(/^(\d+)/) || [, i + 1])[1];
        const clean = l.replace(/^\d+[\.\)]\s*/, "");
        return `<div class="fix-step"><div class="step-num">${num}</div><div class="step-text">${clean}</div></div>`;
      }).join("")}</div>`;
    }
    return `<div class="section-text">${text}</div>`;
  }

  function renderTags(str) {
    if (!str) return "";
    const tags = str.split(",").map(t => t.trim()).filter(Boolean);
    return tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>` : "";
  }

  function sortErrors(list) {
    const by   = document.getElementById("sort-by").value;
    const copy = [...list];
    if (by === "oldest")     return copy.sort((a,b) => a.date.localeCompare(b.date));
    if (by === "difficulty") { const o = {Hard:0,Medium:1,Easy:2}; return copy.sort((a,b) => (o[a.difficulty]??1)-(o[b.difficulty]??1)); }
    if (by === "category")   return copy.sort((a,b) => a.category.localeCompare(b.category));
    return copy.sort((a,b) => b.date.localeCompare(a.date));
  }

  function renderList() {
    const q    = document.getElementById("search").value.toLowerCase();
    const cat  = document.getElementById("filter-cat").value;
    const diff = document.getElementById("filter-diff").value;

    let filtered = allErrors.filter(e => {
      const matchQ = !q    || [e.title,e.errorCode,e.description,e.fix,e.tags].join(" ").toLowerCase().includes(q);
      const matchC = !cat  || e.category   === cat;
      const matchD = !diff || e.difficulty === diff;
      return matchQ && matchC && matchD;
    });
    filtered = sortErrors(filtered);

    const list = document.getElementById("error-list");
    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No errors found.</p></div>`;
      return;
    }

    list.innerHTML = filtered.map((e, i) => `
      <div class="error-card">
        <div class="card-header" onclick="toggleCard(${i})">
          <span class="cat-badge ${catClass(e.category)}">${e.category}</span>
          <span class="diff-badge ${diffClass(e.difficulty)}">${e.difficulty}</span>
          ${e.errorCode ? `<span class="err-code">${e.errorCode}</span>` : ""}
          <span class="card-title">${e.title}</span>
          <span class="card-date">${fmtDate(e.date)}</span>
          <span class="chevron" id="chev-${i}">▶</span>
        </div>
        ${renderTags(e.tags)}
        <div class="card-body" id="body-${i}">
          ${e.description ? `
          <div class="card-section">
            <div class="section-lbl">Error message</div>
            <div class="code-block">
              <pre id="code-${i}">${escHtml(e.description)}</pre>
              <button class="copy-btn" onclick="copyCode(${i},event)">Copy</button>
            </div>
          </div>` : ""}
          ${e.fix ? `
          <div class="card-section">
            <div class="section-lbl">Fix — step by step</div>
            ${renderSteps(e.fix)}
          </div>` : ""}
        </div>
      </div>`).join("");
  }

  const escHtml = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function toggleCard(i) {
    document.getElementById(`body-${i}`).classList.toggle("open");
    document.getElementById(`chev-${i}`).classList.toggle("open");
  }

  function copyCode(i, e) {
    e.stopPropagation();
    navigator.clipboard.writeText(document.getElementById(`code-${i}`).textContent).then(() => {
      e.target.textContent = "Copied!";
      e.target.classList.add("copied");
      setTimeout(() => { e.target.textContent = "Copy"; e.target.classList.remove("copied"); }, 2000);
    });
  }

  function openModal()  { document.getElementById("modal-overlay").classList.add("open"); }
  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    ["f-title","f-code","f-desc","f-fix","f-tags"].forEach(id => document.getElementById(id).value = "");
  }
  function handleOverlayClick(e) { if (e.target.id === "modal-overlay") closeModal(); }

  async function submitError() {
    const title = document.getElementById("f-title").value.trim();
    const desc  = document.getElementById("f-desc").value.trim();
    const fix   = document.getElementById("f-fix").value.trim();
    if (!title || !desc || !fix) { showToast("Fill in all required fields.", "error"); return; }

    const btn = document.getElementById("submit-btn");
    const lbl = document.getElementById("submit-label");
    btn.disabled = true; lbl.textContent = "Saving...";

    try {
      const res = await fetch(`${WORKER_URL}/errors`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title, desc,
          errorCode:   document.getElementById("f-code").value.trim(),
          category:    document.getElementById("f-cat").value,
          difficulty:  document.getElementById("f-diff").value,
          description: desc,
          fix,
          tags: document.getElementById("f-tags").value.trim(),
        }),
      });
      if (!res.ok) throw new Error();
      showToast("Error logged ✓", "success");
      closeModal();
      await loadErrors();
    } catch {
      showToast("Failed to save. Check Worker URL.", "error");
    } finally {
      btn.disabled = false; lbl.textContent = "Save Error";
    }
  }

  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg; t.className = `show ${type}`;
    setTimeout(() => { t.className = ""; }, 3000);
  }

  loadErrors();
</script>
</body>
</html>
