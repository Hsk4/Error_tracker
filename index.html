<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Error Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0908;--bg2:#111009;--bg3:#19170f;--bg4:#211f15;--bg5:#2a271a;
  --amber:#d4930a;--amber2:#b87d08;--amber-dim:rgba(212,147,10,.1);--amber-glow:rgba(212,147,10,.22);
  --text:#ede8dc;--text2:#8a8272;--text3:#4a4538;
  --red:#c94e35;--red-dim:rgba(201,78,53,.1);
  --green:#5a9e72;--green-dim:rgba(90,158,114,.1);
  --blue:#6892b8;--purple:#9e82c4;
  --resolved:rgba(90,158,114,.08);--resolved-border:rgba(90,158,114,.18);
  --mono:'JetBrains Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
  --r:10px;--rl:14px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:6rem;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid rgba(212,147,10,.08);position:sticky;top:0;background:rgba(10,9,8,.94);backdrop-filter:blur(14px);z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;border:1.5px solid var(--amber);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--amber)}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
.btn-primary{background:var(--amber);color:#0a0908;border:none;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--amber2)}
.btn-primary:active{transform:scale(.98)}

/* ── Container ── */
.container{max-width:840px;margin:0 auto;padding:1.75rem 1.25rem}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(212,147,10,.07);border:1px solid rgba(212,147,10,.07);border-radius:var(--rl);overflow:hidden;margin-bottom:1.5rem}
.stat{background:var(--bg2);padding:1rem 1.25rem}
.stat-n{font-size:26px;font-weight:600;line-height:1;margin-bottom:3px}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
@media(max-width:540px){.stats-row{grid-template-columns:repeat(2,1fr)}}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid rgba(212,147,10,.12);border-radius:var(--r);color:var(--text);font-size:13.5px;padding:9px 12px 9px 36px;outline:none;font-family:var(--sans);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--amber)}
.search-wrap input::placeholder{color:var(--text3)}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.t-sel{background:var(--bg2);border:1px solid rgba(212,147,10,.12);border-radius:var(--r);color:var(--text2);font-size:13px;padding:9px 12px;outline:none;cursor:pointer;font-family:var(--sans);transition:border-color .15s}
.t-sel:focus{border-color:var(--amber)}
.t-sel option{background:var(--bg3)}

/* ── Cards ── */
#error-list{display:flex;flex-direction:column;gap:8px}
.error-card{background:var(--bg2);border:1px solid rgba(212,147,10,.1);border-radius:var(--rl);overflow:hidden;transition:border-color .2s}
.error-card:hover{border-color:rgba(212,147,10,.2)}
.error-card.resolved{background:var(--resolved);border-color:var(--resolved-border)}

.card-head{display:flex;align-items:center;gap:8px;padding:13px 14px;cursor:pointer;user-select:none;flex-wrap:wrap;row-gap:6px}
.card-title{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:100px;line-height:1.4}
.card-title.resolved-title{text-decoration:line-through;color:var(--text3)}
.card-date{font-size:11px;color:var(--text3);white-space:nowrap}

/* card actions */
.card-actions{display:flex;align-items:center;gap:4px;margin-left:4px}
.act-btn{background:none;border:1px solid transparent;border-radius:5px;color:var(--text3);font-size:12px;padding:3px 7px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s;line-height:1.4}
.act-btn:hover{background:var(--bg4);color:var(--text);border-color:rgba(212,147,10,.12)}
.act-btn.resolve{color:var(--green)}
.act-btn.resolve:hover{background:var(--green-dim);border-color:rgba(90,158,114,.2)}
.act-btn.unresolve{color:var(--text3)}
.act-btn.del:hover{background:var(--red-dim);color:var(--red);border-color:rgba(201,78,53,.2)}

.chevron{width:18px;height:18px;border-radius:4px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);flex-shrink:0;transition:transform .22s,background .15s}
.chevron.open{transform:rotate(90deg);background:var(--amber-dim);color:var(--amber)}

/* badges */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border:1px solid transparent}
.b-npm  {color:#d4930a;background:rgba(212,147,10,.1); border-color:rgba(212,147,10,.18)}
.b-react{color:#6892b8;background:rgba(104,146,184,.1);border-color:rgba(104,146,184,.18)}
.b-git  {color:#9e82c4;background:rgba(158,130,196,.1);border-color:rgba(158,130,196,.18)}
.b-vite {color:#5a9e72;background:rgba(90,158,114,.1); border-color:rgba(90,158,114,.18)}
.b-ts   {color:#6892b8;background:rgba(104,146,184,.1);border-color:rgba(104,146,184,.18)}
.b-other{color:#6a6050;background:rgba(106,96,80,.1);  border-color:rgba(106,96,80,.18)}
.b-easy {color:#5a9e72;background:rgba(90,158,114,.1); border-color:rgba(90,158,114,.18)}
.b-med  {color:#d4930a;background:rgba(212,147,10,.1); border-color:rgba(212,147,10,.18)}
.b-hard {color:#c94e35;background:rgba(201,78,53,.1);  border-color:rgba(201,78,53,.18)}
.b-done {color:#5a9e72;background:rgba(90,158,114,.1); border-color:rgba(90,158,114,.18)}

.err-pill{font-family:var(--mono);font-size:11px;color:var(--red);background:var(--red-dim);padding:2px 8px;border-radius:5px;border:1px solid rgba(201,78,53,.18);white-space:nowrap}

.card-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 11px}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--text3);border:1px solid rgba(255,255,255,.03);font-family:var(--mono)}

/* card body */
.card-body{border-top:1px solid rgba(212,147,10,.07);overflow:hidden;max-height:0;transition:max-height .32s ease}
.card-body.open{max-height:3000px}
.card-section{padding:14px;border-bottom:1px solid rgba(212,147,10,.06)}
.card-section:last-child{border-bottom:none}
.sec-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:9px}

/* code block display */
.codeblock{background:var(--bg);border:1px solid rgba(212,147,10,.1);border-radius:8px;padding:11px 13px;position:relative}
.codeblock pre{font-family:var(--mono);font-size:12px;color:#d4930a;line-height:1.75;white-space:pre-wrap;word-break:break-all;margin:0;padding-right:52px}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--bg3);border:1px solid rgba(212,147,10,.14);border-radius:5px;color:var(--text2);font-size:11px;padding:3px 9px;cursor:pointer;font-family:var(--sans);transition:color .15s,background .15s;white-space:nowrap}
.copy-btn:hover{background:var(--bg5);color:var(--amber)}
.copy-btn.copied{color:var(--green);border-color:rgba(90,158,114,.25)}

/* markdown rendered */
.md-render{font-size:13.5px;color:var(--text2);line-height:1.75}
.md-render h1{font-size:17px;font-weight:600;color:var(--text);margin:0 0 8px;line-height:1.3}
.md-render h2{font-size:15px;font-weight:600;color:var(--text);margin:0 0 6px}
.md-render h3{font-size:13.5px;font-weight:600;color:var(--text2);margin:0 0 5px}
.md-render p{margin:0 0 6px}
.md-render p:last-child{margin:0}
.md-render ul,.md-render ol{padding-left:1.4em;margin:0 0 6px}
.md-render li{margin-bottom:3px}
.md-render code{font-family:var(--mono);font-size:12px;color:#d4930a;background:rgba(212,147,10,.1);padding:1px 5px;border-radius:3px}
.md-render strong{font-weight:600;color:var(--text)}
.md-render em{font-style:italic;color:var(--text2)}
.md-render blockquote{border-left:2px solid rgba(212,147,10,.3);padding-left:10px;color:var(--text3);margin:0 0 6px}

/* steps */
.steps-list{display:flex;flex-direction:column;gap:12px}
.step-row{display:flex;gap:12px;align-items:flex-start}
.step-dot{width:22px;height:22px;border-radius:50%;background:var(--bg4);border:1px solid rgba(212,147,10,.2);color:var(--amber);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-content{flex:1;min-width:0}
.step-kind{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}

/* empty / loading */
.empty{text-align:center;padding:4rem 1rem;color:var(--text3)}
.empty-icon{font-size:30px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.6}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.7}}
.pulse{animation:pulse 1.6s ease-in-out infinite}

/* confirm overlay */
.confirm-box{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:400;opacity:0;pointer-events:none;transition:opacity .2s;padding:1rem}
.confirm-box.open{opacity:1;pointer-events:all}
.confirm-card{background:var(--bg2);border:1px solid rgba(201,78,53,.25);border-radius:var(--rl);padding:1.5rem;width:100%;max-width:380px;text-align:center}
.confirm-card h3{font-size:15px;font-weight:600;margin-bottom:8px}
.confirm-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1.25rem}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.btn-cancel{background:var(--bg4);border:1px solid rgba(212,147,10,.12);border-radius:7px;color:var(--text2);font-size:13px;font-weight:500;padding:8px 20px;cursor:pointer;font-family:var(--sans);transition:background .15s}
.btn-cancel:hover{background:var(--bg5)}
.btn-danger{background:var(--red);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;padding:8px 20px;cursor:pointer;font-family:var(--sans);transition:background .15s}
.btn-danger:hover{background:#a83d28}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg3);border:1px solid rgba(212,147,10,.2);border-radius:8px;padding:9px 20px;font-size:13px;color:var(--text);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(90,158,114,.35);color:var(--green)}
#toast.err{border-color:rgba(201,78,53,.35);color:var(--red)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .22s;padding:0}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(212,147,10,.14);border-radius:18px 18px 0 0;width:100%;max-width:680px;max-height:94vh;overflow-y:auto;transform:translateY(28px);transition:transform .26s cubic-bezier(.22,1,.36,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:3px;background:var(--bg5);border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem .75rem;position:sticky;top:0;background:var(--bg2);border-bottom:1px solid rgba(212,147,10,.08);z-index:10}
.modal-title{font-size:15px;font-weight:600}
.modal-x{background:var(--bg4);border:none;width:28px;height:28px;border-radius:6px;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.modal-x:hover{background:var(--bg5);color:var(--text)}
.modal-body{padding:1.1rem 1.5rem 0}

/* form */
.fg{margin-bottom:1rem}
.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.fi,.fs,.fta{width:100%;background:var(--bg3);border:1px solid rgba(212,147,10,.12);border-radius:8px;color:var(--text);font-size:13.5px;padding:9px 12px;outline:none;font-family:var(--sans);transition:border-color .15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--amber)}
.fi::placeholder,.fta::placeholder{color:var(--text3)}
.fta{resize:vertical;min-height:72px;line-height:1.6}
.fta.mono{font-family:var(--mono);font-size:12px;color:#d4930a}
.fs option{background:var(--bg3)}
.frow{display:flex;gap:10px}
.frow .fg{flex:1}
.fhint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.divider{border:none;border-top:1px solid rgba(212,147,10,.07);margin:.9rem 0}

/* ── Step builder ── */
.sb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sb-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.sb-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}

.sb-item{background:var(--bg3);border:1px solid rgba(212,147,10,.1);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.sb-item:focus-within{border-color:rgba(212,147,10,.28)}
.sb-item-head{display:flex;align-items:center;gap:7px;padding:8px 11px;border-bottom:1px solid rgba(212,147,10,.07)}
.sb-num{width:20px;height:20px;border-radius:50%;background:var(--bg5);border:1px solid rgba(212,147,10,.18);color:var(--amber);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.type-pills{display:flex;gap:3px}
.tp{font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;border:1px solid rgba(212,147,10,.1);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .14s}
.tp.on{background:var(--amber-dim);border-color:rgba(212,147,10,.28);color:var(--amber)}
.sb-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px 5px;line-height:1;margin-left:auto;transition:color .14s}
.sb-del:hover{color:var(--red)}

/* markdown toolbar */
.md-toolbar{display:flex;align-items:center;gap:3px;padding:6px 10px;border-bottom:1px solid rgba(212,147,10,.07);flex-wrap:wrap;background:var(--bg4)}
.md-btn{background:none;border:1px solid transparent;border-radius:4px;color:var(--text3);font-size:11px;font-weight:600;padding:3px 7px;cursor:pointer;font-family:var(--mono);transition:all .13s;line-height:1.4;white-space:nowrap}
.md-btn:hover{background:var(--bg5);color:var(--text);border-color:rgba(212,147,10,.14)}
.md-sep{width:1px;height:14px;background:rgba(212,147,10,.1);margin:0 2px}
.md-preview-toggle{margin-left:auto;font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;border:1px solid rgba(212,147,10,.14);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .14s}
.md-preview-toggle:hover{background:var(--amber-dim);color:var(--amber)}
.md-preview-toggle.on{background:var(--amber-dim);color:var(--amber);border-color:rgba(212,147,10,.28)}

.sb-editor-wrap{position:relative}
.sb-item textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;padding:10px 12px;outline:none;resize:none;line-height:1.68;font-family:var(--sans);min-height:64px}
.sb-item textarea.mono{font-family:var(--mono);font-size:12px;color:#d4930a;min-height:68px}
.sb-item textarea::placeholder{color:var(--text3)}
.sb-preview{padding:10px 12px;min-height:64px;font-size:13px}
.sb-preview.hidden{display:none}
.sb-item textarea.hidden{display:none}

.btn-add-step{width:100%;background:transparent;border:1px dashed rgba(212,147,10,.18);border-radius:8px;color:var(--text3);font-size:13px;font-weight:500;padding:9px;cursor:pointer;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add-step:hover{border-color:rgba(212,147,10,.38);color:var(--amber);background:var(--amber-dim)}

.btn-submit{width:100%;background:var(--amber);color:#0a0908;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:4px;transition:background .15s;letter-spacing:.01em}
.btn-submit:hover{background:var(--amber2)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-mark">⚡</div>
    <div>
      <div class="brand-name">Error Tracker</div>
      <div class="brand-sub">React · React Native · 6mo roadmap</div>
    </div>
  </div>
  <button class="btn-primary" id="btn-log">+ Log Error</button>
</div>

<div class="container">
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-hard" style="color:var(--red)">—</div><div class="stat-l">Hard</div></div>
    <div class="stat"><div class="stat-n" id="s-fixed" style="color:var(--green)">—</div><div class="stat-l">Resolved</div></div>
    <div class="stat"><div class="stat-n" id="s-npm" style="color:var(--amber)">—</div><div class="stat-l">npm</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input type="text" id="search" placeholder="Search title, code, tags…" oninput="renderList()"/>
    </div>
    <select class="t-sel" id="f-cat" onchange="renderList()">
      <option value="">All categories</option>
      <option>npm</option><option>React</option><option>React Native</option>
      <option>Git</option><option>Vite</option><option>TypeScript</option><option>Other</option>
    </select>
    <select class="t-sel" id="f-diff" onchange="renderList()">
      <option value="">All difficulties</option>
      <option>Easy</option><option>Medium</option><option>Hard</option>
    </select>
    <select class="t-sel" id="f-sort" onchange="renderList()">
      <option value="newest">Newest</option><option value="oldest">Oldest</option>
      <option value="difficulty">Difficulty</option><option value="category">Category</option>
    </select>
  </div>

  <div id="error-list"><div class="loading pulse">Loading errors…</div></div>
</div>

<div id="toast"></div>

<!-- Confirm delete dialog -->
<div class="confirm-box" id="confirm-box">
  <div class="confirm-card">
    <h3>Delete this error?</h3>
    <p>This will permanently remove it from Notion. This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" id="btn-cancel-confirm">Cancel</button>
      <button class="btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Log / Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title" id="modal-title-txt">Log an error</span>
      <button class="modal-x" id="btn-close-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="frow">
        <div class="fg" style="flex:2">
          <label class="fl">Title *</label>
          <input class="fi" id="f-title" placeholder="Short description of what broke"/>
        </div>
        <div class="fg">
          <label class="fl">Error Code</label>
          <input class="fi" id="f-code" placeholder="EPERM, E404…"/>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl">Category</label>
          <select class="fs" id="f-cat2">
            <option>npm</option><option>React</option><option>React Native</option>
            <option>Git</option><option>Vite</option><option>TypeScript</option><option>Other</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Difficulty</label>
          <select class="fs" id="f-diff2">
            <option>Easy</option><option selected>Medium</option><option>Hard</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Error message *</label>
        <textarea class="fta mono" id="f-desc" rows="4" placeholder="Paste the full error output here…"></textarea>
      </div>
      <div class="fg">
        <label class="fl">Tags</label>
        <input class="fi" id="f-tags" placeholder="windows, path, permissions (comma separated)"/>
        <div class="fhint">Comma separated — helps searching later</div>
      </div>
      <hr class="divider"/>
      <div class="fg">
        <div class="sb-header">
          <span class="sb-label">Fix — steps</span>
        </div>
        <div class="sb-list" id="sb-list"></div>
        <button class="btn-add-step" id="btn-add-step">+ Add step</button>
      </div>
      <button class="btn-submit" id="btn-submit-error">
        <span id="f-submit-lbl">Save error</span>
      </button>
      <div style="height:1.5rem"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://error-tracker-proxy.hsk42116.workers.dev";
let allErrors = [];
let steps = [];       // [{id, type:'code'|'text'|'comment', content, preview:bool}]
let editingId = null; // notion page id when editing

/* ════════════════════════════════
   MARKDOWN HELPERS
════════════════════════════════ */
function renderMd(raw) {
  if (!raw) return "";
  let s = raw
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // headings
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    // bold / italic
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    // inline code
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    // blockquote (comment style)
    .replace(/^&gt; (.+)$/gm,"<blockquote>$1</blockquote>")
    // unordered list
    .replace(/^[-*] (.+)$/gm,"<li>$1</li>")
    // ordered list
    .replace(/^\d+\. (.+)$/gm,"<li>$1</li>");

  // wrap consecutive <li> in <ul>
  s = s.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // paragraphs — lines not already wrapped
  s = s.split("\n").map(line => {
    if (/^<(h[123]|ul|li|blockquote)/.test(line) || line.trim() === "") return line;
    return `<p>${line}</p>`;
  }).join("\n");
  return s;
}

function insertMd(stepId, syntax) {
  const ta = document.querySelector(`#step-ta-${stepId}`);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.slice(start, end);
  const map = {
    "# ":"# ","## ":"## ","### ":"### ",
    "**":"**"+sel+"**","*":"*"+sel+"*",
    "`":"`"+sel+"`",
    "- ":"- ","1. ":"1. ",
    "> ":"> ",
  };
  const ins = map[syntax] || syntax;
  const before = ta.value.slice(0, start);
  const after  = ta.value.slice(end);
  const isBlock = ["# ","## ","### ","- ","1. ","> "].includes(syntax);
  const prefix = (isBlock && before.length && !before.endsWith("\n")) ? "\n" : "";
  ta.value = before + prefix + ins + after;
  syncStepContent(stepId, ta.value);
  ta.focus();
}

/* ════════════════════════════════
   STEP BUILDER
════════════════════════════════ */
function addStep(type = "text", content = "") {
  const id = Date.now() + Math.floor(Math.random() * 1000);
  steps.push({ id, type, content, preview: false });
  renderSB();
  setTimeout(() => {
    const ta = document.querySelector(`#step-ta-${id}`);
    if (ta) ta.focus();
  }, 40);
}

function removeStep(id) { steps = steps.filter(s => s.id !== id); renderSB(); }

function setStepType(id, type) {
  const s = steps.find(s => s.id === id);
  if (s) { s.type = type; renderSB(); }
}

function togglePreview(id) {
  const s = steps.find(s => s.id === id);
  if (s) { s.preview = !s.preview; renderSB(); }
}

function syncStepContent(id, val) {
  const s = steps.find(s => s.id === id);
  if (s) s.content = val;
}

function renderSB() {
  const list = document.getElementById("sb-list");
  if (!steps.length) { list.innerHTML = ""; return; }
  list.innerHTML = steps.map((s, i) => {
    const isCode    = s.type === "code";
    const isComment = s.type === "comment";
    const showMdBar = !isCode;
    return `
    <div class="sb-item">
      <div class="sb-item-head">
        <div class="sb-num">${i+1}</div>
        <div class="type-pills">
          <button class="tp${s.type==='text'?' on':''}"    data-sb-action="type" data-type="text">Text</button>
          <button class="tp${s.type==='code'?' on':''}"    data-sb-action="type" data-type="code">Code</button>
          <button class="tp${s.type==='comment'?' on':''}" data-sb-action="type" data-type="comment">Comment</button>
        </div>
        <button class="sb-del" data-sb-action="remove">✕</button>
      </div>
      ${showMdBar ? `
      <div class="md-toolbar">
        <button class="md-btn" data-sb-action="md" data-md="# "    title="Heading 1">H1</button>
        <button class="md-btn" data-sb-action="md" data-md="## "   title="Heading 2">H2</button>
        <button class="md-btn" data-sb-action="md" data-md="### "  title="Heading 3">H3</button>
        <div class="md-sep"></div>
        <button class="md-btn" data-sb-action="md" data-md="DSTAR"    title="Bold"><b>B</b></button>
        <button class="md-btn" data-sb-action="md" data-md="STAR"     title="Italic"><i>I</i></button>
        <div class="md-sep"></div>
        <button class="md-btn" data-sb-action="md" data-md="- "    title="Bullet list">• List</button>
        <button class="md-btn" data-sb-action="md" data-md="1. "   title="Numbered list">1. List</button>
        <div class="md-sep"></div>
        <button class="md-btn" data-sb-action="md" data-md="TICK"     title="Inline code">\`code\`</button>
        ${isComment ? `<button class="md-btn" data-sb-action="md" data-md="GT" title="Comment">&gt; note</button>` : ""}
        <button class="md-preview-toggle${s.preview?' on':''}" data-sb-action="preview">${s.preview?"Edit":"Preview"}</button>
      </div>` : ""}
      <div class="sb-editor-wrap">
        <textarea
          id="step-ta-${s.id}"
          class="${isCode?'mono':''} ${s.preview?'hidden':''}"
          placeholder="${isCode ? 'npm install  /  code to run…' : isComment ? '> Note or comment about this step…' : 'Explain what to do in this step… (markdown supported)'}"
          oninput="syncStepContent(${s.id},this.value)"
          rows="${isCode?3:2}"
        >${escHtml(s.content)}</textarea>
        <div class="sb-preview md-render ${s.preview?'':'hidden'}">${isCode ? `<div class='codeblock' style='margin:8px 12px'><pre>${escHtml(s.content)}</pre></div>` : renderMd(s.content)}</div>
      </div>
    </div>`;
  }).join("");
}

function serializeSteps() {
  return steps
    .filter(s => s.content.trim())
    .map((s,i) => `${i+1}. [${s.type}] ${s.content.trim()}`)
    .join("\n---\n");
}

function deserializeSteps(fix) {
  if (!fix) return [];
  const chunks = fix.split("\n---\n");
  return chunks.map((chunk, i) => {
    const m = chunk.match(/^(\d+)\.\s*\[(code|text|comment)\]\s*([\s\S]*)$/);
    if (m) return { id: Date.now()*100+i, type: m[2], content: m[3].trim(), preview: false };
    // fallback plain line
    const m2 = chunk.match(/^(\d+)[\.\)]\s*([\s\S]*)$/);
    if (m2) return { id: Date.now()*100+i+1, type: "text", content: m2[2].trim(), preview: false };
    return chunk.trim() ? { id: Date.now()*100+i+2, type: "text", content: chunk.trim(), preview: false } : null;
  }).filter(Boolean);
}

/* ════════════════════════════════
   DATA LAYER
════════════════════════════════ */
async function loadErrors() {
  try {
    const res  = await fetch(`${WORKER_URL}/errors`);
    const data = await res.json();
    allErrors = (data.results||[]).map(pageToObj);
    updateStats(); renderList();
  } catch {
    document.getElementById("error-list").innerHTML =
      `<div class="empty"><div class="empty-icon">⚠</div><p>Could not load errors.<br/>Check Worker URL.</p></div>`;
  }
}

function pageToObj(p) {
  return {
    id:          p.id,
    title:       p.properties?.Title?.title?.[0]?.text?.content || "Untitled",
    errorCode:   p.properties?.["Error Code"]?.rich_text?.[0]?.text?.content || "",
    category:    p.properties?.Category?.select?.name || "Other",
    difficulty:  p.properties?.Difficulty?.select?.name || "Medium",
    description: p.properties?.Description?.rich_text?.[0]?.text?.content || "",
    fix:         p.properties?.Fix?.rich_text?.[0]?.text?.content || "",
    tags:        p.properties?.Tags?.rich_text?.[0]?.text?.content || "",
    resolved:    p.properties?.Resolved?.checkbox || false,
    date:        p.properties?.Date?.date?.start || "",
  };
}

function buildProperties(payload) {
  return {
    Title:        { title:     [{ text:{ content: payload.title      || "Untitled" }}]},
    "Error Code": { rich_text: [{ text:{ content: payload.errorCode  || ""         }}]},
    Category:     { select:   { name: payload.category   || "Other"  }},
    Difficulty:   { select:   { name: payload.difficulty || "Medium" }},
    Description:  { rich_text:[{ text:{ content: payload.description || ""         }}]},
    Fix:          { rich_text:[{ text:{ content: payload.fix         || ""         }}]},
    Tags:         { rich_text:[{ text:{ content: payload.tags        || ""         }}]},
    Resolved:     { checkbox:  payload.resolved || false },
    Date:         { date:{ start: payload.date || new Date().toISOString().split("T")[0] }},
  };
}

async function apiPost(payload) {
  const res  = await fetch(`${WORKER_URL}/errors`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) {
    console.error("POST failed:", data);
    throw new Error(data?.message || data?.error || res.status);
  }
  return data;
}

async function apiPatch(id, payload) {
  const res  = await fetch(`${WORKER_URL}/errors/${id}`, {
    method:"PATCH", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) {
    console.error("PATCH failed:", data);
    throw new Error(data?.message || data?.error || res.status);
  }
  return data;
}

async function apiDelete(id) {
  const res  = await fetch(`${WORKER_URL}/errors/${id}`, { method:"DELETE" });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    console.error("DELETE failed:", data);
    throw new Error(data?.message || data?.error || res.status);
  }
}

/* ════════════════════════════════
   CRUD ACTIONS
════════════════════════════════ */
function startEdit(id) {
  const e = allErrors.find(e => e.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById("modal-title-txt").textContent = "Edit error";
  document.getElementById("f-title").value   = e.title;
  document.getElementById("f-code").value    = e.errorCode;
  document.getElementById("f-desc").value    = e.description;
  document.getElementById("f-tags").value    = e.tags;
  setSelectVal("f-cat2",  e.category);
  setSelectVal("f-diff2", e.difficulty);
  steps = deserializeSteps(e.fix);
  renderSB();
  document.getElementById("overlay").classList.add("open");
}

async function toggleResolve(id) {
  const e = allErrors.find(e => e.id === id);
  if (!e) return;
  const newResolved = !e.resolved;
  try {
    await apiPatch(id, { resolved: newResolved });
    e.resolved = newResolved;
    updateStats(); renderList();
    toast(newResolved ? "Marked as resolved ✓" : "Marked as unresolved", "ok");
  } catch { toast("Failed to update.", "err"); }
}

let pendingDeleteId = null;
function startDelete(id) {
  pendingDeleteId = id;
  document.getElementById("confirm-box").classList.add("open");
  document.getElementById("confirm-ok").onclick = confirmDelete;
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById("confirm-box").classList.remove("open");
}
async function confirmDelete() {
  if (!pendingDeleteId) return;
  try {
    await apiDelete(pendingDeleteId);
    allErrors = allErrors.filter(e => e.id !== pendingDeleteId);
    closeConfirm(); updateStats(); renderList();
    toast("Error deleted.", "ok");
  } catch { toast("Delete failed.", "err"); closeConfirm(); }
}

async function duplicateError(id) {
  const e = allErrors.find(e => e.id === id);
  if (!e) return;
  try {
    const data = await apiPost({
      title: e.title + " (copy)", errorCode: e.errorCode,
      category: e.category, difficulty: e.difficulty,
      description: e.description, fix: e.fix,
      tags: e.tags, resolved: false,
    });
    allErrors.unshift(pageToObj(data));
    updateStats(); renderList();
    toast("Duplicated ✓", "ok");
  } catch { toast("Duplicate failed.", "err"); }
}

/* ════════════════════════════════
   SUBMIT (create + edit)
════════════════════════════════ */
async function submitError() {
  const title = document.getElementById("f-title").value.trim();
  const desc  = document.getElementById("f-desc").value.trim();
  const fix   = serializeSteps();
  if (!title) { toast("Title is required.", "err"); return; }
  if (!desc)  { toast("Error message is required.", "err"); return; }
  if (!fix)   { toast("Add at least one fix step.", "err"); return; }

  const btn = document.getElementById("btn-submit-error");
  const lbl = document.getElementById("f-submit-lbl");
  btn.disabled = true; lbl.textContent = editingId ? "Saving…" : "Logging…";

  const payload = {
    title, errorCode: document.getElementById("f-code").value.trim(),
    category: document.getElementById("f-cat2").value,
    difficulty: document.getElementById("f-diff2").value,
    description: desc, fix,
    tags: document.getElementById("f-tags").value.trim(),
  };

  try {
    if (editingId) {
      await apiPatch(editingId, payload);
      const idx = allErrors.findIndex(e => e.id === editingId);
      if (idx !== -1) allErrors[idx] = { ...allErrors[idx], ...payload };
      toast("Saved ✓", "ok");
    } else {
      const data = await apiPost(payload);
      allErrors.unshift(pageToObj(data));
      toast("Error logged ✓", "ok");
    }
    closeModal(); updateStats(); renderList();
  } catch (err) {
    toast(`Failed (${err.message})`, "err");
  } finally {
    btn.disabled = false;
    lbl.textContent = editingId ? "Save changes" : "Save error";
  }
}

/* ════════════════════════════════
   RENDER LIST
════════════════════════════════ */
function updateStats() {
  document.getElementById("s-total").textContent = allErrors.length;
  document.getElementById("s-hard").textContent  = allErrors.filter(e => e.difficulty==="Hard").length;
  document.getElementById("s-fixed").textContent = allErrors.filter(e => e.resolved).length;
  document.getElementById("s-npm").textContent   = allErrors.filter(e => e.category==="npm").length;
}

const catCls  = c => ({npm:"b-npm",React:"b-react","React Native":"b-react",Git:"b-git",Vite:"b-vite",TypeScript:"b-ts"}[c]||"b-other");
const diffCls = d => ({Easy:"b-easy",Medium:"b-med",Hard:"b-hard"}[d]||"b-med");

function fmtDate(d) {
  if (!d) return "";
  return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}

function renderDisplaySteps(fix) {
  const chunks = fix.split("\n---\n");
  const parsed = chunks.map((chunk, i) => {
    const m = chunk.match(/^(\d+)\.\s*\[(code|text|comment)\]\s*([\s\S]*)$/);
    if (m) return { num:m[1], type:m[2], content:m[3].trim() };
    const m2 = chunk.match(/^(\d+)[\.\)]\s*([\s\S]*)$/);
    if (m2) return { num:m2[1], type:"text", content:m2[2].trim() };
    return chunk.trim() ? { num:i+1, type:"text", content:chunk.trim() } : null;
  }).filter(Boolean);

  if (!parsed.length) return `<div class="md-render">${renderMd(fix)}</div>`;

  return `<div class="steps-list">${parsed.map(s => `
    <div class="step-row">
      <div class="step-dot">${s.num}</div>
      <div class="step-content">
        ${s.type==="code"
          ? `<div class="step-kind">Command</div>
             <div class="codeblock">
               <pre>${escHtml(s.content)}</pre>
               <button class="copy-btn" data-action="copy-pre">Copy</button>
             </div>`
          : s.type==="comment"
            ? `<div class="md-render">${renderMd("> "+s.content)}</div>`
            : `<div class="md-render">${renderMd(s.content)}</div>`
        }
      </div>
    </div>`).join("")}</div>`;
}

function renderTags(str) {
  if (!str) return "";
  const tags = str.split(",").map(t=>t.trim()).filter(Boolean);
  return tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="tag">#${t}</span>`).join("")}</div>` : "";
}

function sortList(list) {
  const by = document.getElementById("f-sort").value;
  const c  = [...list];
  if (by==="oldest")     return c.sort((a,b)=>a.date.localeCompare(b.date));
  if (by==="difficulty") { const o={Hard:0,Medium:1,Easy:2}; return c.sort((a,b)=>(o[a.difficulty]??1)-(o[b.difficulty]??1)); }
  if (by==="category")   return c.sort((a,b)=>a.category.localeCompare(b.category));
  return c.sort((a,b)=>b.date.localeCompare(a.date));
}

function renderList() {
  const q    = document.getElementById("search").value.toLowerCase();
  const cat  = document.getElementById("f-cat").value;
  const diff = document.getElementById("f-diff").value;
  let list = allErrors.filter(e => {
    const matchQ = !q    || [e.title,e.errorCode,e.description,e.fix,e.tags].join(" ").toLowerCase().includes(q);
    const matchC = !cat  || e.category===cat;
    const matchD = !diff || e.difficulty===diff;
    return matchQ && matchC && matchD;
  });
  list = sortList(list);

  const el = document.getElementById("error-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">○</div><p>No errors found.</p></div>`;
    return;
  }

  el.innerHTML = list.map((e,i) => `
    <div class="error-card${e.resolved?' resolved':''}" data-id="${e.id}" data-idx="${i}">
      <div class="card-head" data-action="toggle" data-idx="${i}">
        <span class="badge ${catCls(e.category)}">${e.category}</span>
        <span class="badge ${diffCls(e.difficulty)}">${e.difficulty}</span>
        ${e.resolved ? '<span class="badge b-done">Resolved</span>' : ""}
        ${e.errorCode ? '<span class="err-pill">'+escHtml(e.errorCode)+'</span>' : ""}
        <span class="card-title${e.resolved?' resolved-title':''}">${escHtml(e.title)}</span>
        <span class="card-date">${fmtDate(e.date)}</span>
        <div class="card-actions">
          <button class="act-btn ${e.resolved?'unresolve':'resolve'}"
            data-action="resolve" data-id="${e.id}">
            ${e.resolved ? "↩ Unresolve" : "✓ Resolve"}
          </button>
          <button class="act-btn" data-action="edit" data-id="${e.id}">Edit</button>
          <button class="act-btn" data-action="duplicate" data-id="${e.id}">Copy</button>
          <button class="act-btn del" data-action="delete" data-id="${e.id}">Del</button>
        </div>
        <div class="chevron" id="chev-${i}">▶</div>
      </div>
      ${renderTags(e.tags)}
      <div class="card-body" id="body-${i}">
        ${e.description ? `
        <div class="card-section">
          <div class="sec-lbl">Error output</div>
          <div class="codeblock">
            <pre>${escHtml(e.description)}</pre>
            <button class="copy-btn" data-action="copy-pre">Copy</button>
          </div>
        </div>` : ""}
        ${e.fix ? `
        <div class="card-section">
          <div class="sec-lbl">Fix — steps</div>
          ${renderDisplaySteps(e.fix)}
        </div>` : ""}
      </div>
    </div>`).join("");

  attachListDelegation();
}

function attachListDelegation() {
  const el = document.getElementById("error-list");
  el.removeEventListener("click", listClickHandler);
  el.addEventListener("click", listClickHandler);
}

function listClickHandler(ev) {
  const btn     = ev.target.closest("[data-action]");
  if (!btn) return;
  const action  = btn.dataset.action;
  const id      = btn.dataset.id;
  const idx     = parseInt(btn.dataset.idx ?? btn.closest("[data-idx]")?.dataset.idx ?? "-1");

  if (action === "toggle") {
    const realIdx = parseInt(btn.dataset.idx);
    document.getElementById("body-"+realIdx)?.classList.toggle("open");
    document.getElementById("chev-"+realIdx)?.classList.toggle("open");
    return;
  }
  ev.stopPropagation();
  if (action === "resolve")   toggleResolve(id);
  if (action === "edit")      startEdit(id);
  if (action === "duplicate") duplicateError(id);
  if (action === "delete")    startDelete(id);
  if (action === "copy-pre") {
    const pre = btn.previousElementSibling;
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = "Copied!"; btn.classList.add("copied");
      setTimeout(()=>{ btn.textContent="Copy"; btn.classList.remove("copied"); }, 2000);
    });
  }
}



/* ════════════════════════════════
   MODAL
════════════════════════════════ */
function openModal() {
  editingId = null;
  steps = [];
  renderSB();
  document.getElementById("modal-title-txt").textContent = "Log an error";
  document.getElementById("f-submit-lbl").textContent    = "Save error";
  ["f-title","f-code","f-desc","f-tags"].forEach(id => document.getElementById(id).value = "");
  setSelectVal("f-cat2","npm"); setSelectVal("f-diff2","Medium");
  document.getElementById("overlay").classList.add("open");
  setTimeout(()=>document.getElementById("f-title").focus(),200);
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  editingId = null; steps = [];
}

function overlayClick(e) { if (e.target.id==="overlay") closeModal(); }
function setSelectVal(id, val) {
  const s = document.getElementById(id);
  [...s.options].forEach(o => o.selected = o.value===val);
}

/* ════════════════════════════════
   UTILS
════════════════════════════════ */
function toast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(()=>{ t.className=""; }, 3000);
}
const escHtml = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function init() {
    // Wire all static buttons — safe to call at any point after DOM is ready
    document.getElementById("btn-log")           ?.addEventListener("click", openModal);
    document.getElementById("btn-cancel-confirm") ?.addEventListener("click", closeConfirm);
    document.getElementById("btn-close-modal")   ?.addEventListener("click", closeModal);
    document.getElementById("btn-add-step")      ?.addEventListener("click", () => addStep());
    document.getElementById("btn-submit-error")  ?.addEventListener("click", submitError);
    document.getElementById("overlay")?.addEventListener("click", e => {
      if (e.target.id === "overlay") closeModal();
    });
    document.getElementById("modal")?.addEventListener("click", sbClickHandler);
    attachListDelegation();
    loadErrors();
  }

  // Script is at bottom of <body> so DOM is already parsed — call init() directly
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

  function sbClickHandler(ev) {
    const btn = ev.target.closest("[data-sb-action]");
    if (!btn) return;
    ev.stopPropagation();
    const action = btn.dataset.sbAction;
    const item   = btn.closest(".sb-item");
    if (!item) return;
    const idx = [...document.querySelectorAll(".sb-item")].indexOf(item);
    if (idx < 0 || !steps[idx]) return;
    const sid = steps[idx].id;
    if (action === "type")    setStepType(sid, btn.dataset.type);
    if (action === "remove")  removeStep(sid);
    if (action === "preview") togglePreview(sid);
    if (action === "md") {
      const raw = (btn.dataset.md||"")
        .replace("DSTAR","**").replace("STAR","*")
        .replace("TICK","`").replace("GT","> ");
      insertMd(sid, raw);
    }
  }

</script>
</body>
